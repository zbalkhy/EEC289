seed: 289

env:
  id: InvertedPendulum-v5

dataset:
  warmup_steps: 10
  max_horizon: 1000
  lqr_gain: [-0.3, -15.0, -0.8, -1.5]
  ar1_rho: 0.9

splits:
  train:
    windows: 1024
    reset_noise_scale: 0.01
    action_noise_sigma: 0.15
  val:
    windows: 256
    reset_noise_scale: 0.01
    action_noise_sigma: 0.15
  test:
    windows: 256
    reset_noise_scale: 0.01
    action_noise_sigma: 0.15
  ood:
    windows: 256
    reset_noise_scale: 0.03
    action_noise_sigma: 0.15

filter:
  max_abs_true_angle: 0.20
  max_attempts_multiplier: 120

smoke:
  train_windows: 32
  val_windows: 16
  test_windows: 32
  ood_windows: 16
